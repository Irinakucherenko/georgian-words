name: Add Word
description: Add new Georgian word
title: "[ADD_WORD]"
labels:
  - add-word

body:
  - type: input
    id: georgian
    attributes:
      label: Georgian Word
    validations:
      required: true

  - type: input
    id: russian
    attributes:
      label: Russian Translation
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - basic
        - body
        - food
    validations:
      required: true

  - type: input
    id: imageurl
    attributes:
      label: Image URL
    validations:
      required: true
