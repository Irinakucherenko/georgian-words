name: Word actions

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process-word-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Check issue type
        id: check
        run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ "$TITLE" == \[ADD_WORD\]* ]]; then
            echo "action=add" >> $GITHUB_OUTPUT
          elif [[ "$TITLE" == \[EDIT_WORD\]* ]]; then
            echo "action=edit" >> $GITHUB_OUTPUT
          elif [[ "$TITLE" == \[DELETE_WORD\]* ]]; then
            echo "action=delete" >> $GITHUB_OUTPUT
          else
            echo "action=skip" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not a word issue
        if: steps.check.outputs.action == 'skip'
        run: |
          echo "Not a supported issue type"
          exit 0

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process issue and update words.json
        uses: actions/github-script@v7
        env:
          ACTION_TYPE: ${{ steps.check.outputs.action }}
        with:
          script: |
            const fs = require('fs');

            const actionType = process.env.ACTION_TYPE;
            const body = context.payload.issue.body || '';

            function extractField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n\\n###|$)`, 's');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const filePath = 'words.json';
            const raw = fs.readFileSync(filePath, 'utf8');
            const data = JSON.parse(raw);

            if (!Array.isArray(data.words)) {
              core.setFailed('words.json does not contain a valid words array.');
              return;
            }

            if (actionType === 'add') {
              const georgian = extractField('Georgian Word');
              const russian = extractField('Russian Translation');
              const category = extractField('Category');
              const imageUrl = extractField('Image URL');

              if (!georgian || !russian || !category || !imageUrl) {
                core.setFailed('One or more ADD fields are empty.');
                return;
              }

              const nextId = data.words.length > 0
                ? Math.max(...data.words.filter(Boolean).map(w => Number(w.id) || 0)) + 1
                : 1;

              data.words.push({
                id: nextId,
                georgian,
                russian,
                imageUrl,
                category,
                createdAt: new Date().toISOString()
              });
            }

            if (actionType === 'edit') {
              const oldGeorgian = extractField('Old Georgian Word');
              const newGeorgian = extractField('New Georgian Word');
              const russian = extractField('Russian Translation');
              const category = extractField('Category');
              const imageUrl = extractField('Image URL');

              if (!oldGeorgian || !newGeorgian || !russian || !category || !imageUrl) {
                core.setFailed('One or more EDIT fields are empty.');
                return;
              }

              const word = data.words.find(
                w => (w.georgian || '').trim() === oldGeorgian.trim()
              );

              if (!word) {
                core.setFailed(`Word not found for edit: ${oldGeorgian}`);
                return;
              }

              word.georgian = newGeorgian;
              word.russian = russian;
              word.category = category;
              word.imageUrl = imageUrl;
            }

            if (actionType === 'delete') {
              const georgian = extractField('Georgian Word');

              if (!georgian) {
                core.setFailed('Delete field is empty.');
                return;
              }

              const initialLength = data.words.length;
              data.words = data.words.filter(
                w => (w.georgian || '').trim() !== georgian.trim()
              );

              if (data.words.length === initialLength) {
                core.setFailed(`Word not found for delete: ${georgian}`);
                return;
              }
            }

            data.version = (Number(data.version) || 0) + 1;

            fs.writeFileSync(filePath, JSON.stringify(data, null, 2) + '\n', 'utf8');

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add words.json
          git commit -m "Process word issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
