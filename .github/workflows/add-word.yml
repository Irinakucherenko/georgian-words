name: Add word from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  add-word:
    if: startsWith(github.event.issue.title, '[ADD_WORD]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse issue and update words.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const body = context.payload.issue.body || '';

            function extractField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n(.+?)(\\n\\n###|$)`, 's');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const georgian = extractField('Georgian Word');
            const russian = extractField('Russian Translation');
            const category = extractField('Category');
            const imageUrl = extractField('Image URL');

            if (!georgian || !russian || !category || !imageUrl) {
              core.setFailed('One or more fields are empty.');
              return;
            }

            const filePath = 'words.json';
            const raw = fs.readFileSync(filePath, 'utf8');
            const data = JSON.parse(raw);

            if (!Array.isArray(data.words)) {
              core.setFailed('words.json does not contain a valid words array.');
              return;
            }

            const nextId = data.words.length > 0
              ? Math.max(...data.words.filter(Boolean).map(w => Number(w.id) || 0)) + 1
              : 1;

            data.words.push({
              id: nextId,
              georgian,
              russian,
              imageUrl,
              category
            });

            data.version = (Number(data.version) || 0) + 1;

            fs.writeFileSync(filePath, JSON.stringify(data, null, 2), 'utf8');

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add words.json
          git commit -m "Add word from issue" || echo "No changes to commit"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
