<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Georgian Words Admin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f5f7;
      color: #222;
    }

    .page {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 300px;
      min-width: 300px;
      max-width: 300px;
      background: #ffffff;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 14px;
      border-bottom: 1px solid #eee;
    }

    .sidebar-header h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .sidebar-header input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      height: 40px;
    }

    .word-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .word-item {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: 0.15s ease;
      font-size: 14px;
      line-height: 1.3;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .word-item:hover {
      background: #f9fafb;
      border-color: #cfcfcf;
    }

    .word-item.active {
      border-color: #222;
      background: #f0f3f8;
    }

    .word-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .word-georgian-inline {
      font-weight: 700;
    }

    .word-separator {
      color: #777;
      margin: 0 4px;
    }

    .word-russian-inline {
      color: #444;
    }

    .content {
      flex: 1;
      padding: 30px;
    }

    .card {
      max-width: 760px;
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .top-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .top-row button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: #222;
      color: white;
    }

    .secondary {
      background: #eceff3;
      color: #222;
    }

    .danger {
      background: #b3261e;
      color: white;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    .preview-block {
      margin-top: 20px;
      padding: 16px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 14px;
    }

    .preview-block img {
      display: none;
      max-width: 240px;
      max-height: 240px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
    }

    .success {
      color: #146c2e;
    }

    .error {
      color: #b00020;
    }

    .hint {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #eef3ff;
      font-size: 14px;
      line-height: 1.5;
    }

    .empty {
      color: #777;
      padding: 16px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        max-height: 40vh;
      }

      .content {
        padding: 16px;
      }

      .word-item {
        white-space: normal;
      }

      .word-line {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Words Admin</h1>
        <input id="searchInput" type="text" placeholder="Поиск слова..." />
      </div>
      <div id="wordList" class="word-list">
        <div class="empty">Загрузка списка...</div>
      </div>
    </aside>

    <main class="content">
      <div class="card">
        <div class="top-row">
          <button class="secondary" id="newBtn" type="button">Создать новое</button>
          <button class="secondary" id="refreshBtn" type="button">Обновить список</button>
          <button class="primary" id="saveBtn" type="button">Сохранить изменения</button>
          <button class="danger" id="deleteBtn" type="button">Удалить выбранное</button>
        </div>

        <h2 id="formTitle">Новое слово</h2>

        <label for="georgian">Грузинское слово</label>
        <input id="georgian" type="text" placeholder="Например: წყალი" />

        <label for="russian">Русский перевод</label>
        <input id="russian" type="text" placeholder="Например: вода" />

        <label for="category">Категория</label>
        <select id="category">
          <option value="basic">basic</option>
          <option value="body">body</option>
          <option value="food">food</option>
        </select>

        <label for="imageUrl">Ссылка на картинку</label>
        <input id="imageUrl" type="text" placeholder="Вставь GitHub ссылку или raw URL" />

        <div class="preview-block">
          <button class="secondary" id="previewBtn" type="button">Показать превью</button>
          <div id="previewMessage" class="message"></div>
          <img id="previewImage" alt="Preview" />
        </div>

        <div class="hint">
          Сейчас:
          <br><br>
          <b>Сохранить изменения</b> открывает issue на редактирование
          <br>
          <b>Удалить выбранное</b> открывает issue на удаление
        </div>
      </div>
    </main>
  </div>

  <script>
    const repoOwner = "Irinakucherenko";
    const repoName = "georgian-words";

    const wordList = document.getElementById("wordList");
    const searchInput = document.getElementById("searchInput");

    const formTitle = document.getElementById("formTitle");
    const georgianInput = document.getElementById("georgian");
    const russianInput = document.getElementById("russian");
    const categoryInput = document.getElementById("category");
    const imageUrlInput = document.getElementById("imageUrl");

    const previewBtn = document.getElementById("previewBtn");
    const previewImage = document.getElementById("previewImage");
    const previewMessage = document.getElementById("previewMessage");

    const newBtn = document.getElementById("newBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const saveBtn = document.getElementById("saveBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    let allWords = [];
    let filteredWords = [];
    let selectedWord = null;

    function normalizeGitHubImageUrl(url) {
      if (!url) return "";

      let result = url.trim();

      if (result.includes("github.com") && result.includes("/blob/")) {
        result = result
          .replace("https://github.com/", "https://raw.githubusercontent.com/")
          .replace("/blob/", "/");
      }

      return result.replace("?raw=true", "");
    }

    function resetForm() {
      selectedWord = null;
      formTitle.textContent = "Новое слово";
      georgianInput.value = "";
      russianInput.value = "";
      categoryInput.value = "basic";
      imageUrlInput.value = "";
      previewImage.style.display = "none";
      previewMessage.textContent = "";
      renderList();
    }

    function fillForm(word) {
      selectedWord = word;
      formTitle.textContent = `Редактирование: ${word.georgian}`;
      georgianInput.value = word.georgian || "";
      russianInput.value = word.russian || "";
      categoryInput.value = word.category || "basic";
      imageUrlInput.value = word.imageUrl || "";
      previewImage.style.display = "none";
      previewMessage.textContent = "";
      renderList();
    }

    function renderList() {
      const query = searchInput.value.trim().toLowerCase();

      filteredWords = allWords
        .filter(word => {
          const ge = (word.georgian || "").toLowerCase();
          const ru = (word.russian || "").toLowerCase();
          return ge.includes(query) || ru.includes(query);
        })
        .sort((a, b) =>
          (a.georgian || "").localeCompare((b.georgian || ""), "ka")
        );

      if (filteredWords.length === 0) {
        wordList.innerHTML = `<div class="empty">Ничего не найдено</div>`;
        return;
      }

      wordList.innerHTML = filteredWords.map(word => {
        const active = selectedWord && selectedWord.georgian === word.georgian ? "active" : "";

        return `
          <div class="word-item ${active}" data-georgian="${escapeHtml(word.georgian)}">
            <div class="word-line">
              <span class="word-georgian-inline">${escapeHtml(word.georgian || "")}</span>
              <span class="word-separator">-</span>
              <span class="word-russian-inline">${escapeHtml(word.russian || "")}</span>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".word-item").forEach(item => {
        item.addEventListener("click", () => {
          const georgian = item.getAttribute("data-georgian");
          const word = allWords.find(w => w.georgian === georgian);
          if (word) fillForm(word);
        });
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function loadWords() {
      try {
        wordList.innerHTML = `<div class="empty">Загрузка...</div>`;

        const response = await fetch(
          `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/words.json?t=${Date.now()}`
        );

        const data = await response.json();

        allWords = Array.isArray(data.words)
          ? data.words.filter(Boolean)
          : [];

        renderList();
      } catch {
        wordList.innerHTML = `<div class="empty">Не удалось загрузить список слов</div>`;
      }
    }

    searchInput.addEventListener("input", renderList);
    newBtn.addEventListener("click", resetForm);
    refreshBtn.addEventListener("click", loadWords);

    loadWords();
  </script>
</body>
</html>
